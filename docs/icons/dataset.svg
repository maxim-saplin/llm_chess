<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <!-- Paper Outline -->
  <rect x="0" y="0" width="11" height="2" fill="#000" />
  <rect x="0" y="2" width="2" height="12" fill="#000" />
  <rect x="0" y="14" width="16" height="2" fill="#000" />
  <rect x="14" y="6" width="2" height="8" fill="#000" />
  
  <!-- Fold -->
  <rect x="9" y="2" width="2" height="4" fill="#000" />
  <rect x="11" y="5" width="5" height="1" fill="#000" />
  <!-- Diagonal -->
  <rect x="11" y="2" width="1" height="1" fill="#000" />
  <rect x="12" y="3" width="2" height="2" fill="#000" />

  <!-- Dataset Grid -->
  <!-- 3x3 grid fitting in x=3..12, y=7..12 (10x6 pixels) -->
  <rect x="3" y="7" width="2" height="2" fill="#000" />
  <rect x="6" y="7" width="2" height="2" fill="#000" />
  <rect x="9" y="7" width="2" height="2" fill="#000" />
  <rect x="12" y="7" width="2" height="2" fill="#000" />
  
  <rect x="3" y="10" width="2" height="2" fill="#000" />
  <rect x="6" y="10" width="2" height="2" fill="#000" />
  <rect x="9" y="10" width="2" height="2" fill="#000" />
  <rect x="12" y="10" width="2" height="2" fill="#000" />
</svg>